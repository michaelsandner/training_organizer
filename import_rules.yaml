severity: error
rules:
  - reason: Domain entities and repositories must not depend on the data or UI layers.
    target: lib/domain/**
    exclude_target: lib/domain/usecases/**
    disallow:
      - lib/data/**
      - lib/ui/**

  - reason: Data layer code must not depend on the UI layer.
    target: lib/data/**
    disallow: lib/ui/**

  - reason: Unit tests should stay free of direct IO dependencies.
    target: test/unit/**
    disallow: dart:io
